data:
  dataset_name: ffhq256
  image_size: 256

  train:
    image_dir: data/processed/ffhq256/train/images
    batch_size: 4
    shuffle: true

  val:
    image_dir: data/processed/ffhq256/val/images
    batch_size: 2
    shuffle: false

  test:
    image_dir: data/processed/ffhq256/test/images
    batch_size: 2
    shuffle: false

  loader:
    num_workers: 4
    pin_memory: true
    drop_last: false

  mask:
    type: irregular
    hole_range: [0.1, 0.5]
    fixed_mask: false